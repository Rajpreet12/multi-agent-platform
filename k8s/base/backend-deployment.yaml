apiVersion: v1
kind: ServiceAccount
metadata:
  name: multi-agent-backend-sa
  namespace: multi-agent
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::903584666644:role/multi-agent-bedrock-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-backend
  namespace: multi-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multi-agent-backend
  template:
    metadata:
      labels:
        app: multi-agent-backend
    spec:
      serviceAccountName: multi-agent-backend-sa
      containers:
      - name: backend
        image: 903584666644.dkr.ecr.us-east-1.amazonaws.com/multi-agent-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: BEDROCK_MODEL_ID
          value: "anthropic.claude-sonnet-4-5-20250929-v1:0"
        envFrom:
        - configMapRef:
            name: multi-agent-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
